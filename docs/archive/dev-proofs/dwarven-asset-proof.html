<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickDeck Dwarven Asset Proof (v0.9.4)</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 24px; color: #eee; background: #111; }
    h1 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(360px,1fr)); gap: 16px; }
    .card { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 12px; }
    .preview { min-height: 120px; border: 1px dashed #666; border-radius: 6px; padding: 8px;
      background-color: #222;
      background-image: linear-gradient(45deg,#333 25%,transparent 25%),linear-gradient(-45deg,#333 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#333 75%),linear-gradient(-45deg,transparent 75%,#333 75%);
      background-size: 18px 18px; background-position: 0 0,0 9px,9px -9px,-9px 0;
      display:flex; align-items:center; justify-content:center; }
    .preview img { image-rendering: auto; }
    code { font-size: 12px; }
  </style>
</head>
<body>
  <h1>Dwarven Asset Proof — v0.9.4 normalization targets</h1>
  <div id="grid" class="grid"></div>
<script>
const assets = [
  ["assets/ui/dwarven/frame/top-rail.webp","512x48","Frame top rail","repeat-x"],
  ["assets/ui/dwarven/frame/bottom-rail.webp","512x48","Frame bottom rail","repeat-x"],
  ["assets/ui/dwarven/frame/left-rail.webp","48x512","Frame left rail","repeat-y"],
  ["assets/ui/dwarven/frame/right-rail.webp","48x512","Frame right rail","repeat-y"],
  ["assets/ui/dwarven/frame/corner-top-left.webp","96x96","Frame corner TL","fixed"],
  ["assets/ui/dwarven/frame/corner-top-right.webp","96x96","Frame corner TR","fixed"],
  ["assets/ui/dwarven/frame/corner-bottom-left.webp","96x96","Frame corner BL","fixed"],
  ["assets/ui/dwarven/frame/corner-bottom-right.webp","96x96","Frame corner BR","fixed"],
  ["assets/ui/dwarven/header/section-title-plate.webp","512x72","Header/title plate shell","stretch-x"],
  ["assets/ui/dwarven/header/knotwork-strip.webp","512x32","Header knotwork strip","repeat-x"],
  ["assets/ui/dwarven/button/button-square.webp","64x64","Square/icon button shell","fixed"],
  ["assets/ui/dwarven/button/button-wide.webp","192x64","Wide action button shell","stretch-x"],
  ["assets/ui/dwarven/collapse/left-collapse-tab.webp","48x160","Left collapse handle/tab","fixed"],
  ["assets/ui/dwarven/collapse/right-collapse-tab.webp","48x160","Right collapse handle/tab","fixed"]
];
const grid=document.getElementById('grid');
for (const [path,target,usage,guide] of assets){
  const card=document.createElement('article'); card.className='card';
  const img = new Image(); img.src='../'+path; img.alt=path;
  img.onload=()=>meta.textContent=`actual: ${img.naturalWidth}x${img.naturalHeight} | target: ${target}`;
  const pv=document.createElement('div'); pv.className='preview'; pv.appendChild(img);
  const p=document.createElement('p'); p.innerHTML=`<code>${path}</code><br><strong>usage:</strong> ${usage}<br><strong>guidance:</strong> ${guide}`;
  const meta=document.createElement('p'); meta.textContent='actual: loading...';
  card.append(pv,p,meta); grid.appendChild(card);
}
</script>
</body>
</html>
