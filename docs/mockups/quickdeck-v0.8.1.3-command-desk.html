<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickDeck v0.8.1.3 Command Desk Mock</title>
  <link rel="stylesheet" href="./quickdeck-v0.8.1.3-command-desk.css" />
</head>
<body>
  <main class="qd-shell" data-left-collapsed="false" data-right-collapsed="false">
    <header class="qd-topbar">
      <h1>GURPS QuickDeck</h1>
      <span class="qd-badge">QD v0.8.1.3 — mock-in-repo</span>
    </header>

    <section class="qd-plaque">Command Desk</section>

    <section class="qd-body" aria-label="QuickDeck Command Desk Body">
      <aside class="qd-left-panel">
        <div class="qd-panel-header">
          <h2>Roster</h2>
          <button id="collapse-left" type="button" aria-label="Collapse left panel">◀</button>
        </div>
        <h3 class="qd-subhead">Roster</h3>
        <ul class="qd-roster" id="roster-list"></ul>
        <h3 class="qd-subhead">Available Actors</h3>
        <ul class="qd-roster" id="available-list"></ul>
      </aside>

      <button class="qd-left-rail" id="reopen-left" type="button" aria-label="Reopen left panel">Roster</button>

      <section class="qd-center-panel">
        <div class="qd-portrait" aria-hidden="true">Portrait</div>
        <h2 id="selected-actor-name">Thog Ironfist</h2>

        <div class="qd-stats-cards">
          <article><h3>HP</h3><p>14 / 14</p></article>
          <article><h3>FP</h3><p>11 / 11</p></article>
          <article><h3>Move</h3><p>6</p></article>
        </div>

        <div class="qd-dials">
          <article><h3>Dodge</h3><p>9</p></article>
          <article><h3>Parry</h3><p>11</p></article>
          <article><h3>Block</h3><p>10</p></article>
        </div>

        <div class="qd-actions">
          <button type="button">All-Out Attack</button>
          <button type="button">Defend</button>
          <button type="button">Aim</button>
          <button type="button">Evaluate</button>
          <button type="button">More</button>
        </div>
      </section>

      <aside class="qd-right-panel">
        <div class="qd-panel-header">
          <h2>Drawer</h2>
          <button id="collapse-right" type="button" aria-label="Collapse right panel">▶</button>
        </div>
        <nav class="qd-tabs" id="drawer-tabs"></nav>
        <div class="qd-tab-content" id="drawer-content"></div>
      </aside>

      <aside class="qd-right-rail" id="right-rail" aria-label="Reopen right panel tabs"></aside>
    </section>
  </main>

  <script>
    const rosterNames = ["Orin Kharne", "Armia", "Alamae Piehler"];
    const actorNames = ["Thog Ironfist", "Seraphina Vale", "Goblin Raider"];
    const drawerData = {
      Combat: [
        "Broadsword",
        "Shield Bash",
        "Fast Draw",
        "All-Out Attack (Strong)",
        "Power Attack",
        "Defend",
        "Evaluate"
      ],
      Skills: ["Broadsword", "Fast-Draw", "Stealth", "Observation", "Tactics"],
      Spells: ["Minor Healing", "Light", "Haste", "Shield"],
      Reference: ["Reference placeholder only. No copyrighted text."],
      Settings: [
        "PDF Source Manager mock",
        "User-selected PDFs are primary.",
        "Built-in summaries are fallback only.",
        "No copyrighted text is bundled."
      ]
    };

    const shell = document.querySelector(".qd-shell");
    const rosterList = document.getElementById("roster-list");
    const availableList = document.getElementById("available-list");
    const selectedActorName = document.getElementById("selected-actor-name");
    const drawerTabs = document.getElementById("drawer-tabs");
    const drawerContent = document.getElementById("drawer-content");
    const rightRail = document.getElementById("right-rail");

    let selectedActorIndex = 0;
    let activeTab = "Combat";

    function renderRoster() {
      rosterList.innerHTML = "";
      rosterNames.forEach((name, index) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = name;
        if (index === selectedActorIndex) btn.classList.add("is-selected");
        btn.addEventListener("click", () => {
          selectedActorIndex = index;
          selectedActorName.textContent = actorNames[selectedActorIndex];
          renderRoster();
          renderAvailableActors();
        });
        li.appendChild(btn);
        rosterList.appendChild(li);
      });
    }

    function renderAvailableActors() {
      availableList.innerHTML = "";
      actorNames.forEach((name, index) => {
        const li = document.createElement("li");
        li.textContent = name;
        if (index === selectedActorIndex) li.classList.add("is-selected-row");
        availableList.appendChild(li);
      });
    }

    function renderTabs() {
      drawerTabs.innerHTML = "";
      Object.keys(drawerData).forEach((tabName) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = tabName;
        if (tabName === activeTab) btn.classList.add("is-active");
        btn.addEventListener("click", () => {
          activeTab = tabName;
          renderTabs();
          renderContent();
        });
        drawerTabs.appendChild(btn);
      });
    }

    function renderRightRail() {
      rightRail.innerHTML = "";
      Object.keys(drawerData).forEach((tabName) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = tabName;
        btn.addEventListener("click", () => {
          activeTab = tabName;
          shell.dataset.rightCollapsed = "false";
          renderTabs();
          renderContent();
        });
        rightRail.appendChild(btn);
      });
    }

    function renderContent() {
      drawerContent.innerHTML = "";
      const list = document.createElement("ul");
      drawerData[activeTab].forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
      drawerContent.appendChild(list);
    }

    document.getElementById("collapse-left").addEventListener("click", () => {
      shell.dataset.leftCollapsed = "true";
    });

    document.getElementById("reopen-left").addEventListener("click", () => {
      shell.dataset.leftCollapsed = "false";
    });

    document.getElementById("collapse-right").addEventListener("click", () => {
      shell.dataset.rightCollapsed = "true";
    });

    renderRoster();
    renderAvailableActors();
    renderTabs();
    renderContent();
    renderRightRail();
  </script>
</body>
</html>
